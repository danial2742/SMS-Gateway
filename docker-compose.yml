services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sms_gateway
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    # No host port published — only compose-network services need it, and a
    # local machine commonly already has something bound to 5432.
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: apache/kafka:3.8.0
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      # Single-broker local dev — RF=1 so __consumer_offsets can actually be
      # created (the 3-broker-cluster default would leave every consumer
      # group unable to find a coordinator).
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build: { context: ., dockerfile: docker/Dockerfile.migrate }
    env_file: .env
    depends_on:
      postgres: { condition: service_healthy }

  api:
    build: { context: ., dockerfile: docker/Dockerfile.api }
    env_file: .env
    depends_on:
      migrate: { condition: service_completed_successfully }
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      kafka: { condition: service_healthy }
    ports: ["8080:8080"]

  outbox-relay:
    build: { context: ., dockerfile: docker/Dockerfile.outbox-relay }
    env_file: .env
    depends_on:
      migrate: { condition: service_completed_successfully }
      postgres: { condition: service_healthy }
      kafka: { condition: service_healthy }

  fair-scheduler:
    build: { context: ., dockerfile: docker/Dockerfile.fair-scheduler }
    env_file: .env
    depends_on:
      migrate: { condition: service_completed_successfully }
      redis: { condition: service_healthy }
      kafka: { condition: service_healthy }

  express-worker:
    build: { context: ., dockerfile: docker/Dockerfile.express-worker }
    env_file: .env
    depends_on:
      migrate: { condition: service_completed_successfully }
      postgres: { condition: service_healthy }
      kafka: { condition: service_healthy }

  normal-worker:
    build: { context: ., dockerfile: docker/Dockerfile.normal-worker }
    env_file: .env
    depends_on:
      migrate: { condition: service_completed_successfully }
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      kafka: { condition: service_healthy }

volumes:
  pgdata:
